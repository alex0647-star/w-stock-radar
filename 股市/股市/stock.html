<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>股票詳細行情</title>
    <link rel="stylesheet" href="/styles.css?v=20260601-4" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body class="stock-detail-page">
    <main class="stock-detail-shell">
      <header class="stock-detail-header">
        <a class="back-link" href="/index.html">回推薦清單</a>
        <div>
          <p class="eyebrow">Taiwan Stock Detail</p>
          <h1 id="stockTitle">讀取股票...</h1>
          <p id="stockSubtitle" class="data-status">初始化行情資料中</p>
        </div>
      </header>

      <section class="quote-dashboard" aria-label="即時行情看板">
        <div class="quote-tile quote-main-tile">
          <span>最新價格</span>
          <strong id="quotePrice">--</strong>
          <em id="quoteChange">0 / 0%</em>
        </div>
        <div class="quote-tile"><span>開盤價</span><strong id="quoteOpen">--</strong></div>
        <div class="quote-tile"><span>最高價</span><strong id="quoteHigh">--</strong></div>
        <div class="quote-tile"><span>最低價</span><strong id="quoteLow">--</strong></div>
        <div class="quote-tile"><span>成交量</span><strong id="quoteVolume">--</strong></div>
      </section>

      <section class="chart-workspace">
        <div class="chart-toolbar">
          <div>
            <h2>K 線與即時走勢</h2>
            <p id="crosshairInfo">移動游標可查看 O/H/L/C 與成交量</p>
          </div>
          <div class="range-tabs" role="group" aria-label="圖表區間">
            <button class="active" data-range="intraday" type="button">分時</button>
            <button data-range="daily" type="button">日K</button>
            <button data-range="weekly" type="button">週K</button>
            <button data-range="monthly" type="button">月K</button>
          </div>
        </div>
        <div id="stockChart" class="stock-chart" role="img" aria-label="股票 K 線圖"></div>
      </section>
    </main>

    <script src="/stock-detail.js"></script>
  </body>
</html>
