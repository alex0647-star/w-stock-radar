<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的最愛股票觀察</title>
    <link rel="stylesheet" href="styles.css?v=20260601-3" />
  </head>
  <body data-page="favorites">
    <div class="app-shell favorites-shell">
      <aside class="sidebar" aria-label="最愛觀察工具">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">TW</div>
          <div>
            <h1>我的最愛股票觀察</h1>
            <p>集中查看已收藏股票的走勢與風險</p>
          </div>
        </div>

        <nav class="page-nav" aria-label="頁面切換">
          <a href="index.html">推薦清單</a>
          <a class="active" href="favorites.html">我的最愛</a>
        </nav>

        <div class="sidebar-action-panel">
          <button id="refreshButton" class="update-button" type="button">立即更新</button>
          <p class="sidebar-note">
            最愛清單會保存在目前瀏覽器。若更換裝置或清除瀏覽器資料，收藏清單需要重新加入。
          </p>
        </div>

        <div class="favorite-summary">
          <div>
            <span>收藏股票</span>
            <strong id="watchCount">0 檔</strong>
          </div>
          <div>
            <span>平均分數</span>
            <strong id="avgScore">0</strong>
          </div>
          <div>
            <span>平均殖利率</span>
            <strong id="avgYield">0%</strong>
          </div>
        </div>

        <div class="risk-box sidebar-risk">
          <span>觀察組合風險</span>
          <strong id="portfolioRisk">--</strong>
          <div class="risk-meter">
            <i id="riskFill"></i>
          </div>
        </div>

      </aside>

      <main class="workspace">
        <section class="topbar favorites-topbar" aria-label="最愛摘要">
          <div>
            <p class="eyebrow">Favorite Watchlist</p>
            <h2>我的最愛觀察頁</h2>
            <p class="data-status" id="dataStatus">準備讀取台股報價...</p>
          </div>
          <a class="return-link" href="index.html">回推薦清單加入股票</a>
        </section>

        <section class="favorite-layout">
          <div>
            <div class="section-heading">
              <h3>收藏股票走向</h3>
              <p>這裡只顯示你在推薦清單按下「加入最愛」的股票。</p>
            </div>
            <div class="recommendations favorite-grid" id="stockGrid" aria-live="polite"></div>
          </div>

          <aside class="watch-panel favorite-side" aria-label="最愛快覽">
            <div class="panel-heading">
              <h3>快覽清單</h3>
              <span id="matchCount">0 檔</span>
            </div>
            <div id="watchList" class="watch-list empty">尚未加入觀察</div>
          </aside>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
